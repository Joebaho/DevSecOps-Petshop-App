apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petshop-stage
  namespace: argocd
spec:
  project: default
  source:
    path: helm/petshop
    repoURL: https://github.com/Joebaho/DevSecOps-Petshop-App.git
    targetRevision: HEAD
    helm:
      valueFiles:
        - values-stage.yaml
  destination:
    namespace: stage
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
