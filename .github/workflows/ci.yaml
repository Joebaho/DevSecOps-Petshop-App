name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths-ignore:
      - "helm/petshop/values-*.yaml"
      - "gitops/**"

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build application
        run: mvn -B clean verify -f app/pom.xml

      - name: Build container image
        run: docker build -t petshop:${{ github.sha }} ./app

      - name: Scan container image
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: petshop:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Configure AWS credentials
        if: github.event_name == 'push'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Log in to Amazon ECR
        if: github.event_name == 'push'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.event_name == 'push'
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ECR_REPOSITORY="${ECR_REPOSITORY:-petshop-app}"
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          docker tag "petshop:${IMAGE_TAG}" "${IMAGE_URI}"
          docker push "${IMAGE_URI}"
          echo "IMAGE_REPOSITORY=${ECR_REGISTRY}/${ECR_REPOSITORY}" >> "$GITHUB_ENV"

      - name: Update dev image tag for GitOps
        if: github.event_name == 'push'
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|^  repository:.*|  repository: ${IMAGE_REPOSITORY}|" helm/petshop/values-dev.yaml
          sed -i "s|^  tag:.*|  tag: ${IMAGE_TAG}|" helm/petshop/values-dev.yaml

      - name: Commit GitOps update
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/petshop/values-dev.yaml
          git diff --cached --quiet && exit 0
          git commit -m "chore: promote ${GITHUB_SHA} to dev [skip ci]"
          git push
